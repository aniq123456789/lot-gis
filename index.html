<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cempaka Digital Resident - PUO</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <style>
            body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; }
            
            /* --- HEADER SECTION --- */
            header {
                position: relative; height: 130px; width: 100%; overflow: hidden;
                display: flex; align-items: center; justify-content: center; color: white;
                border-bottom: 5px solid #e74c3c; z-index: 1000;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            }

            #header-video {
                position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
                width: auto; height: auto; transform: translate(-50%, -50%);
                z-index: -1; filter: brightness(25%); object-fit: cover;
            }

            .header-content { 
                display: flex; align-items: center; width: 96%; 
                justify-content: space-between; z-index: 1; 
            }

            .logo-container { display: flex; align-items: center; gap: 15px; }
            
            /* Logo Poli_Logo.png di belah kiri */
            .logo-poli { 
                height: 80px; 
                width: auto; 
                object-fit: contain;
                filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.4));
            }
            
            .logo-puo { 
                height: 85px; 
                width: auto; 
                object-fit: contain;
            }

            .header-titles { text-align: right; }
            .header-titles h1 { margin: 0; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
            .header-titles p { margin: 0; font-size: 13px; color: #ffeb3b; font-weight: 400; opacity: 0.9; }

            /* --- LAYOUT --- */
            #wrapper { display: flex; width: 100%; height: calc(100vh - 130px); }
            #sidebar { min-width: 340px; max-width: 340px; background: #ffffff; transition: 0.3s; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 1050; }
            #sidebar.active { margin-left: -340px; }
            .content-area { padding: 15px; flex-grow: 1; overflow-y: auto; }
            #map-container { flex-grow: 1; position: relative; }
            #map { width: 100%; height: 100%; background: #ececec; }
            
            #sidebarCollapse { position: absolute; top: 15px; left: 15px; z-index: 1000; background: #1a252f; color: white; border: none; border-radius: 5px; padding: 10px 15px; cursor: pointer; }

            .card-menu { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
            .card-menu h6 { font-weight: 700; color: #1a252f; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #e74c3c; padding-bottom: 8px; }
            
            .info-box { background: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c; margin-bottom: 10px; }
            .info-label { font-size: 10px; text-transform: uppercase; color: #95a5a6; font-weight: bold; display: block; }
            .info-value { font-size: 15px; color: #2c3e50; font-weight: 600; }

            .btn-pdf { background: #d9534f; color: white; width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: 600; transition: 0.3s; margin-top: 5px; }
            .btn-pdf:hover { background: #c9302c; transform: translateY(-2px); color: white; }

            /* --- OVERLAY & PDF --- */
            #loading-overlay {
                display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); 
                z-index: 9999; color:white; text-align:center; padding-top:20%; font-size: 18px;
            }
            #pdf-report-template { display: none; background: white; padding: 40px; width: 800px; }
        </style>
    </head>
    <body>

        <div id="loading-overlay">Sila Tunggu, Menjana Laporan PDF...</div>

        <header>
            <video autoplay muted loop playsinline id="header-video">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-interface-background-31776-large.mp4" type="video/mp4">
            </video>
            <div class="header-content">
                <div class="logo-container">
                    <img src="Poli_Logo.png" alt="Logo Poli" class="logo-poli">
                    <img src="image_247e7c.png" alt="Logo PUO" class="logo-puo">
                </div>
                <div class="header-titles">
                    <h1>Cempaka Digital Resident</h1>
                    <p>Sistem Peta Lot Tanah Politeknik Ungku Omar</p>
                </div>
            </div>
        </header>

        <div id="wrapper">
            <nav id="sidebar">
                <div class="content-area">
                    <div class="card-menu">
                        <h6><i class="fas fa-file-invoice text-danger"></i> Butiran Lot Terpilih</h6>
                        <div id="placeholderText" class="text-center py-3 text-muted small">
                            Sila klik lot atau buat carian.
                        </div>
                        <div id="lotDataDisplay" style="display: none;">
                            <div class="info-box">
                                <span class="info-label">Nombor Lot</span>
                                <span class="info-value" id="res-no-lot">-</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Keluasan (Area)</span>
                                <span class="info-value" id="res-luas">-</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Pemilik</span>
                                <span class="info-value" id="res-owner">-</span>
                            </div>
                            <button class="btn btn-pdf" onclick="cetakPDF()">
                                <i class="fas fa-print me-2"></i> CETAK LAPORAN PDF
                            </button>
                        </div>
                    </div>

                    <div class="card-menu">
                        <h6><i class="fas fa-search text-primary"></i> Cari No Lot</h6>
                        <select id="lotSearchSelector" class="form-select">
                            <option value="">-- Pilih Nombor Lot --</option>
                        </select>
                    </div>
                </div>
            </nav>

            <div id="map-container">
                <button id="sidebarCollapse"><i class="fas fa-bars"></i></button>
                <div id="map"></div>
            </div>
        </div>

        <div id="pdf-report-template">
            <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #e74c3c; padding-bottom: 15px; margin-bottom: 20px;">
                <img src="Poli_Logo.png" style="height: 60px;">
                <div style="text-align: center;">
                    <h2 style="margin: 0;">LAPORAN MAKLUMAT LOT</h2>
                    <p style="margin: 0; color: #666;">Politeknik Ungku Omar</p>
                </div>
                <img src="image_247e7c.png" style="height: 70px;">
            </div>
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px;">
                <tr>
                    <td style="padding: 12px; border: 1px solid #ddd; background: #f9f9f9; font-weight: bold; width: 30%;">Nombor Lot</td>
                    <td style="padding: 12px; border: 1px solid #ddd;" id="pdf-lot"></td>
                </tr>
                <tr>
                    <td style="padding: 12px; border: 1px solid #ddd; background: #f9f9f9; font-weight: bold;">Pemilik</td>
                    <td style="padding: 12px; border: 1px solid #ddd;" id="pdf-owner"></td>
                </tr>
                <tr>
                    <td style="padding: 12px; border: 1px solid #ddd; background: #f9f9f9; font-weight: bold;">Keluasan</td>
                    <td style="padding: 12px; border: 1px solid #ddd;" id="pdf-area"></td>
                </tr>
            </table>
            <div id="pdf-map-capture" style="text-align: center; border: 2px solid #eee; border-radius: 8px; overflow: hidden;"></div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/LOTFINAL_0.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <script>
            var highlightLayer;
            window.selectedLotData = null;

            var map = L.map('map', { zoomControl: false }).setView([2.10385, 102.5214], 19);
            L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22 }).addTo(map);

            // MENGAMBIL PEMILIK DARI MEDAN 'tsp — pe'
            function getOwner(props) {
                return props['tsp — pe'] || props['Pemilik'] || 'Tiada Maklumat';
            }

            function updatePanel(props) {
                $('#placeholderText').hide();
                $('#lotDataDisplay').fadeIn();
                $('#res-no-lot').text(props['NO LOT'] || 'N/A');
                $('#res-luas').text(parseFloat(props['AREA']).toFixed(3) + ' m²');
                $('#res-owner').text(getOwner(props)); // Pemilik berubah di sini
                window.selectedLotData = props;
            }

            function highlightFeature(layer) {
                if (highlightLayer) { lotLayer.resetStyle(highlightLayer); }
                highlightLayer = layer;
                highlightLayer.setStyle({ weight: 4, color: '#ffff00', fillOpacity: 0.6 });
                updatePanel(highlightLayer.feature.properties);
            }

            var lotLayer = L.geoJson(json_LOTFINAL_0, {
                style: { color: 'white', weight: 1.5, fillColor: '#e74c3c', fillOpacity: 0.3 },
                onEachFeature: function(feature, layer) {
                    if (feature.properties['NO LOT']) {
                        $('#lotSearchSelector').append(`<option value="${feature.properties['NO LOT']}">Lot ${feature.properties['NO LOT']}</option>`);
                    }
                    layer.on('click', function(e) {
                        highlightFeature(layer);
                        map.fitBounds(layer.getBounds());
                    });
                }
            }).addTo(map);

            // CARIAN NO LOT
            $('#lotSearchSelector').change(function() {
                var val = $(this).val();
                lotLayer.eachLayer(function(layer) {
                    if (layer.feature.properties['NO LOT'] == val) {
                        map.fitBounds(layer.getBounds());
                        highlightFeature(layer);
                    }
                });
            });

            $('#sidebarCollapse').click(function() { $('#sidebar').toggleClass('active'); });

            async function cetakPDF() {
                if (!window.selectedLotData) return;
                document.getElementById('loading-overlay').style.display = 'block';
                
                $('#pdf-lot').text(window.selectedLotData['NO LOT']);
                $('#pdf-owner').text(getOwner(window.selectedLotData));
                $('#pdf-area').text(parseFloat(window.selectedLotData['AREA']).toFixed(3) + ' m²');

                html2canvas(document.getElementById('map'), { useCORS: true }).then(canvas => {
                    $('#pdf-map-capture').html(`<img src="${canvas.toDataURL()}" style="width:100%;">`);
                    const element = document.getElementById('pdf-report-template');
                    element.style.display = 'block';
                    html2pdf().from(element).save().then(() => {
                        element.style.display = 'none';
                        document.getElementById('loading-overlay').style.display = 'none';
                    });
                });
            }
        </script>
    </body>
</html>
