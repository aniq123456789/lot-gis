<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cempaka Digital Resident - PUO</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <style>
            body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; }
            header {
                position: relative; height: 130px; width: 100%; overflow: hidden;
                display: flex; align-items: center; justify-content: center; color: white;
                border-bottom: 5px solid #e74c3c; z-index: 1000;
            }
            #header-video {
                position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
                width: auto; height: auto; transform: translate(-50%, -50%);
                z-index: -1; filter: brightness(25%); object-fit: cover;
            }
            .header-content { display: flex; align-items: center; width: 96%; justify-content: space-between; z-index: 1; }
            .logo-poli { height: 80px; }
            .logo-puo { height: 85px; }

            #wrapper { display: flex; width: 100%; height: calc(100vh - 130px); }
            #sidebar { min-width: 340px; background: #ffffff; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 1050; transition: 0.3s; }
            #sidebar.active { margin-left: -340px; }
            #map-container { flex-grow: 1; position: relative; }
            #map { width: 100%; height: 100%; background: #222; }
            
            #sidebarCollapse { position: absolute; top: 15px; left: 15px; z-index: 1000; background: #1a252f; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }

            .card-menu { background: #fff; border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid #eee; }
            .card-menu h6 { font-weight: 700; color: #1a252f; margin-bottom: 12px; border-bottom: 2px solid #e74c3c; padding-bottom: 8px; }
            
            .info-box { background: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 5px solid #e74c3c; margin-bottom: 12px; }
            .info-label { font-size: 11px; text-transform: uppercase; color: #95a5a6; font-weight: 800; display: block; }
            .info-value { font-size: 17px; color: #2c3e50; font-weight: 700; display: block; margin-top: 2px; }

            .btn-pdf { background: #d9534f; color: white; width: 100%; border: none; padding: 14px; border-radius: 10px; font-weight: 700; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
            .btn-pdf:hover { background: #c9302c; }

            #loading-overlay {
                display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); 
                z-index: 9999; color:white; text-align:center; padding-top:20%; font-size: 20px;
            }
        </style>
    </head>
    <body>

        <div id="loading-overlay">
            <div class="spinner-border text-danger mb-3" role="status"></div>
            <br>Menyelaraskan Kedudukan Lot & Menjana Laporan...
        </div>

        <img id="logoPuo" src="image_247e7c.png" style="display:none;">

        <header>
            <video autoplay muted loop playsinline id="header-video">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-interface-background-31776-large.mp4" type="video/mp4">
            </video>
            <div class="header-content">
                <img src="Poli_Logo.png" class="logo-poli">
                <div class="text-center">
                    <h1 class="m-0 fw-bold">Cempaka Digital Resident</h1>
                    <p class="m-0 text-warning">Sistem Maklumat Lot Tanah Terdigital</p>
                </div>
                <img src="image_247e7c.png" class="logo-puo">
            </div>
        </header>

        <div id="wrapper">
            <nav id="sidebar">
                <div class="card-menu">
                    <h6>Butiran Lot Terpilih</h6>
                    <div id="lotDataDisplay">
                        <div class="info-box">
                            <span class="info-label">Nombor Lot</span>
                            <span class="info-value" id="res-no-lot">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Keluasan (Area)</span>
                            <span class="info-value" id="res-luas">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Pemilik</span>
                            <span class="info-value" id="res-owner">-</span>
                        </div>
                        <button class="btn btn-pdf" onclick="generateFinalPDF()">
                            <i class="fas fa-print"></i> CETAK LAPORAN RASMI
                        </button>
                    </div>
                </div>
                <div class="card-menu">
                    <h6>Cari No Lot</h6>
                    <select id="lotSearchSelector" class="form-select">
                        <option value="">-- Pilih Nombor Lot --</option>
                    </select>
                </div>
            </nav>

            <div id="map-container">
                <button id="sidebarCollapse"><i class="fas fa-bars"></i></button>
                <div id="map"></div>
            </div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/LOTFINAL_0.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <script>
            var highlightLayer;
            window.selectedLotData = { lot: "-", owner: "-", area: "-" };

            var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([2.10385, 102.5214], 19);
            
            var satelliteLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { 
                maxZoom: 22, 
                crossOrigin: 'anonymous' 
            }).addTo(map);

            var defaultStyle = { color: 'white', weight: 1.5, fillColor: '#e74c3c', fillOpacity: 0.3 };

            function highlightFeature(layer) {
                lotLayer.eachLayer(l => lotLayer.resetStyle(l));
                highlightLayer = layer;
                highlightLayer.setStyle({ 
                    weight: 4, 
                    color: '#ffff00', 
                    fillColor: '#e74c3c', 
                    fillOpacity: 0.4 
                });
                
                var props = highlightLayer.feature.properties;
                document.getElementById('res-no-lot').innerText = props['NO LOT'] || "-";
                document.getElementById('res-owner').innerText = props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)";
                document.getElementById('res-luas').innerText = (props['AREA'] ? parseFloat(props['AREA']).toFixed(3) + " m²" : "-");
                
                window.selectedLotData = {
                    lot: props['NO LOT'] || "-",
                    owner: props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)",
                    area: (props['AREA'] ? parseFloat(props['AREA']).toFixed(3) + " m²" : "-")
                };
            }

            var lotLayer = L.geoJson(json_LOTFINAL_0, {
                style: defaultStyle,
                onEachFeature: function(feature, layer) {
                    if (feature.properties['NO LOT']) {
                        $('#lotSearchSelector').append(`<option value="${feature.properties['NO LOT']}">Lot ${feature.properties['NO LOT']}</option>`);
                    }
                    layer.on({
                        click: function(e) {
                            highlightFeature(e.target);
                            map.flyToBounds(e.target.getBounds(), { padding: [80, 80] });
                        }
                    });
                }
            }).addTo(map);

            $('#lotSearchSelector').change(function() {
                var val = $(this).val();
                lotLayer.eachLayer(layer => {
                    if (layer.feature.properties['NO LOT'] == val) {
                        highlightFeature(layer);
                        map.flyToBounds(layer.getBounds(), { padding: [80, 80] });
                    }
                });
            });

            $('#sidebarCollapse').click(function() { $('#sidebar').toggleClass('active'); });

            // --- FUNGSI JANA PDF (TITIK FOKUS TENGAH & JELAS) ---
            async function generateFinalPDF() {
                if(window.selectedLotData.lot === "-") {
                    alert("Sila pilih lot pada peta terlebih dahulu.");
                    return;
                }

                document.getElementById('loading-overlay').style.display = "block";

                // 1. TEKNIK FOKUS: Cari pusat lot dan paksa peta ke tengah tepat
                if(highlightLayer) {
                    // Sembunyikan sidebar & butang bar untuk capture yang bersih
                    document.getElementById('sidebarCollapse').style.display = 'none';
                    
                    // Gunakan fitBounds dengan padding 0 untuk memastikan ia betul-betul di tengah frame
                    map.fitBounds(highlightLayer.getBounds(), { padding: [150, 150], animate: false });
                    
                    // Tambah Label Lot yang sangat jelas di tengah lot
                    var center = highlightLayer.getBounds().getCenter();
                    var tempMarker = L.marker(center, {
                        icon: L.divIcon({
                            className: 'pdf-label',
                            html: `<div style="background:yellow; color:black; padding:5px 10px; border:2px solid black; font-weight:bold; border-radius:5px; white-space:nowrap;">LOT ${window.selectedLotData.lot}</div>`,
                            iconSize: [100, 40]
                        })
                    }).addTo(map);
                }

                // Tunggu sebentar untuk rendering tiles satelit yang tajam
                await new Promise(r => setTimeout(r, 1200));

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a3'); 
                
                // Ambil skrin dengan skala tinggi (3) untuk kejelasan maksimum
                const canvas = await html2canvas(document.getElementById('map'), { 
                    useCORS: true, 
                    scale: 3,
                    logging: false
                });
                const imgData = canvas.toDataURL('image/png');

                // Lukis Frame Laporan
                doc.setDrawColor(44, 62, 80);
                doc.setLineWidth(1.5); doc.rect(10, 10, 400, 277); // Outer
                doc.setLineWidth(0.5); doc.rect(12, 12, 396, 273); // Inner
                doc.line(95, 10, 95, 287); // Divider sidebar

                // Header Sidebar
                try {
                    const logo = document.getElementById("logoPuo");
                    doc.addImage(logo, 'PNG', 35, 20, 25, 30);
                } catch(e){}

                doc.setFont("times", "bold"); doc.setFontSize(16);
                doc.text("POLITEKNIK UNGKU OMAR", 47.5, 60, {align: "center"});
                doc.setDrawColor(231, 76, 60); doc.setLineWidth(1); doc.line(20, 65, 85, 65);

                doc.setFontSize(11); doc.setFont("times", "normal"); doc.setTextColor(100);
                doc.text("JABATAN KEJURUTERAAN AWAM", 47.5, 72, {align: "center"});
                doc.setFont("times", "bold"); doc.setTextColor(231, 76, 60);
                doc.text("UNIT GEOMATIK", 47.5, 78, {align: "center"});

                // Seksyen Data (Susunan Teratur)
                let yPos = 105;
                const dataFields = [
                    { label: "NOMBOR LOT", value: window.selectedLotData.lot },
                    { label: "PEMILIK BERDAFTAR", value: window.selectedLotData.owner },
                    { label: "KELUASAN TANAH", value: window.selectedLotData.area },
                    { label: "TARIKH SISTEM", value: new Date().toLocaleDateString('ms-MY', {day:'2-digit', month:'long', year:'numeric'}) }
                ];

                dataFields.forEach(item => {
                    doc.setFont("helvetica", "bold"); doc.setFontSize(9); doc.setTextColor(150);
                    doc.text(item.label, 18, yPos);
                    
                    doc.setFillColor(248, 249, 250); doc.rect(18, yPos + 2, 70, 14, 'F');
                    doc.setDrawColor(200); doc.rect(18, yPos + 2, 70, 14, 'S');

                    doc.setFont("times", "bold"); doc.setFontSize(12); doc.setTextColor(0);
                    let textLines = doc.splitTextToSize(item.value.toUpperCase(), 65);
                    doc.text(textLines, 22, yPos + 10);
                    yPos += 28;
                });

                // Memasukkan Gambar Peta yang telah difokus ke tengah
                // x=97, y=14, lebar=308, tinggi=269 (Memenuhi ruang kanan A3)
                doc.addImage(imgData, 'PNG', 97, 14, 308, 269, undefined, 'FAST');

                // Footer
                doc.setFontSize(9); doc.setFont("helvetica", "italic"); doc.setTextColor(180);
                doc.text("Sistem Maklumat Digital Resident (PUO) © 2026", 47.5, 275, {align: "center"});

                // Simpan & Reset Semula UI
                doc.save(`PELAN_LOT_${window.selectedLotData.lot}_PUO.pdf`);
                
                map.removeLayer(tempMarker); // Buang label kuning sementara
                document.getElementById('sidebarCollapse').style.display = 'block';
                document.getElementById('loading-overlay').style.display = "none";
            }
        </script>
    </body>
</html>
