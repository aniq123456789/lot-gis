<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cempaka Digital Resident - PUO</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <style>
            body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; }
            header {
                position: relative; height: 130px; width: 100%; overflow: hidden;
                display: flex; align-items: center; justify-content: center; color: white;
                border-bottom: 5px solid #e74c3c; z-index: 1000;
            }
            #header-video {
                position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
                width: auto; height: auto; transform: translate(-50%, -50%);
                z-index: -1; filter: brightness(25%); object-fit: cover;
            }
            .header-content { display: flex; align-items: center; width: 96%; justify-content: space-between; z-index: 1; }
            .logo-poli, .logo-puo { height: 80px; }

            #wrapper { display: flex; width: 100%; height: calc(100vh - 130px); }
            #sidebar { min-width: 340px; background: #ffffff; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 1050; transition: 0.3s; }
            #sidebar.active { margin-left: -340px; }
            #map-container { flex-grow: 1; position: relative; background: #eee; }
            #map { width: 100%; height: 100%; }
            
            #sidebarCollapse { position: absolute; top: 15px; left: 15px; z-index: 1000; background: #1a252f; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }

            .card-menu { background: #fff; border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid #eee; }
            .card-menu h6 { font-weight: 700; color: #1a252f; margin-bottom: 12px; border-bottom: 2px solid #e74c3c; padding-bottom: 8px; }
            
            .info-box { background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 5px solid #e74c3c; margin-bottom: 10px; }
            .info-label { font-size: 10px; text-transform: uppercase; color: #95a5a6; font-weight: 800; display: block; }
            .info-value { font-size: 15px; color: #2c3e50; font-weight: 700; display: block; }

            .btn-pdf { background: #27ae60; color: white; width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: 700; transition: 0.3s; }
            .btn-pdf:hover { background: #219150; transform: translateY(-2px); }

            #loading-overlay {
                display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); 
                z-index: 9999; color:white; text-align:center; padding-top:20%;
            }
            
            /* Label khusus dalam peta semasa dijana */
            .map-label-focused {
                background: rgba(255, 255, 0, 0.9);
                border: 2px solid #000;
                padding: 4px 8px;
                font-weight: bold;
                color: #000;
                border-radius: 4px;
                white-space: nowrap;
                font-size: 14px;
            }
        </style>
    </head>
    <body>

        <div id="loading-overlay">
            <div class="spinner-border text-light mb-3"></div>
            <h3>Menjana Laporan PDF...</h3>
            <p>Sila tunggu, sistem sedang merakam kedudukan satelit lot.</p>
        </div>

        <img id="logoPuo" src="image_247e7c.png" style="display:none;">

        <header>
            <video autoplay muted loop playsinline id="header-video">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-interface-background-31776-large.mp4" type="video/mp4">
            </video>
            <div class="header-content">
                <img src="Poli_Logo.png" class="logo-poli">
                <div class="text-center">
                    <h1 class="m-0 fw-bold">Cempaka Digital Resident</h1>
                    <p class="m-0 text-warning">Sistem Maklumat Lot Tanah Terdigital (Jabatan Geomatik)</p>
                </div>
                <img src="image_247e7c.png" class="logo-puo">
            </div>
        </header>

        <div id="wrapper">
            <nav id="sidebar">
                <div class="card-menu">
                    <h6>Butiran Lot Terpilih</h6>
                    <div id="lotDataDisplay">
                        <div class="info-box">
                            <span class="info-label">Nombor Lot</span>
                            <span id="res-no-lot" class="info-value">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Keluasan</span>
                            <span id="res-luas" class="info-value">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Pemilik</span>
                            <span id="res-owner" class="info-value">-</span>
                        </div>
                        <button class="btn btn-pdf" onclick="generateFinalPDF()">
                            <i class="fas fa-file-download"></i> MUAT TURUN LAPORAN PDF
                        </button>
                    </div>
                </div>
                <div class="card-menu">
                    <h6>Carian Lot</h6>
                    <select id="lotSearchSelector" class="form-select">
                        <option value="">-- Pilih Nombor Lot --</option>
                    </select>
                </div>
            </nav>

            <div id="map-container">
                <button id="sidebarCollapse"><i class="fas fa-bars"></i></button>
                <div id="map"></div>
            </div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/LOTFINAL_0.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <script>
            var highlightLayer;
            window.selectedLotData = { lot: "-", owner: "-", area: "-" };

            // Inisialisasi Peta
            var map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                preferCanvas: true // Membantu kualiti render
            }).setView([2.10385, 102.5214], 19);
            
            // Layer Satelit Google dengan CrossOrigin diaktifkan
            var satelliteLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { 
                maxZoom: 22, 
                crossOrigin: 'anonymous' 
            }).addTo(map);

            var defaultStyle = { color: 'white', weight: 1.5, fillColor: '#e74c3c', fillOpacity: 0.3 };

            function highlightFeature(layer) {
                lotLayer.eachLayer(l => lotLayer.resetStyle(l));
                highlightLayer = layer;
                highlightLayer.setStyle({ 
                    weight: 5, 
                    color: '#ffff00', 
                    fillColor: '#e74c3c', 
                    fillOpacity: 0.4 
                });
                
                var props = highlightLayer.feature.properties;
                document.getElementById('res-no-lot').innerText = props['NO LOT'] || "-";
                document.getElementById('res-owner').innerText = props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)";
                document.getElementById('res-luas').innerText = (props['AREA'] ? parseFloat(props['AREA']).toFixed(3) + " m²" : "-");
                
                window.selectedLotData = {
                    lot: props['NO LOT'] || "-",
                    owner: props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)",
                    area: (props['AREA'] ? parseFloat(props['AREA']).toFixed(3) + " m²" : "-")
                };
            }

            var lotLayer = L.geoJson(json_LOTFINAL_0, {
                style: defaultStyle,
                onEachFeature: function(feature, layer) {
                    if (feature.properties['NO LOT']) {
                        $('#lotSearchSelector').append(`<option value="${feature.properties['NO LOT']}">Lot ${feature.properties['NO LOT']}</option>`);
                    }
                    layer.on({
                        click: function(e) {
                            highlightFeature(e.target);
                            map.flyToBounds(e.target.getBounds(), { padding: [100, 100] });
                        }
                    });
                }
            }).addTo(map);

            $('#lotSearchSelector').change(function() {
                var val = $(this).val();
                lotLayer.eachLayer(layer => {
                    if (layer.feature.properties['NO LOT'] == val) {
                        highlightFeature(layer);
                        map.flyToBounds(layer.getBounds(), { padding: [100, 100] });
                    }
                });
            });

            $('#sidebarCollapse').click(function() { $('#sidebar').toggleClass('active'); });

            // --- FUNGSI JANA PDF: LOT DI TENGAH & SAMA DENGAN SATELIT ---
            async function generateFinalPDF() {
                if(window.selectedLotData.lot === "-") {
                    alert("Sila pilih satu lot terlebih dahulu.");
                    return;
                }

                const overlay = document.getElementById('loading-overlay');
                overlay.style.display = "block";

                // 1. Kunci Peta & Letak Label Sementara
                if(highlightLayer) {
                    map.fitBounds(highlightLayer.getBounds(), { padding: [140, 140], animate: false });
                    
                    var center = highlightLayer.getBounds().getCenter();
                    var tempMarker = L.marker(center, {
                        icon: L.divIcon({
                            className: 'map-label-focused',
                            html: `LOT ${window.selectedLotData.lot}`,
                            iconSize: [80, 30]
                        })
                    }).addTo(map);
                }

                // Tunggu 1.5 saat untuk tiles satelit load sepenuhnya (Sangat penting!)
                await new Promise(r => setTimeout(r, 1500));

                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('l', 'mm', 'a3'); 
                    
                    // Capture peta menggunakan html2canvas
                    const canvas = await html2canvas(document.getElementById('map'), { 
                        useCORS: true, 
                        scale: 3, // Kualiti tinggi
                        allowTaint: false,
                        ignoreElements: (el) => el.id === 'sidebarCollapse'
                    });
                    
                    const imgData = canvas.toDataURL('image/png');

                    // --- REKABENTUK PDF ---
                    // Bingkai & Sempadan
                    doc.setDrawColor(30); doc.setLineWidth(1); doc.rect(10, 10, 400, 277);
                    doc.line(95, 10, 95, 287); 

                    // Header (Logo & Tajuk)
                    try {
                        const logo = document.getElementById("logoPuo");
                        doc.addImage(logo, 'PNG', 35, 20, 25, 30);
                    } catch(e){}

                    doc.setFont("times", "bold"); doc.setFontSize(18);
                    doc.text("LAPORAN LOT TANAH", 52.5, 65, {align: "center"});
                    doc.setFontSize(12); doc.text("Unit Geomatik, PUO", 52.5, 72, {align: "center"});
                    
                    // Maklumat Data Lot
                    let startY = 100;
                    const data = [
                        ["NO LOT", window.selectedLotData.lot],
                        ["PEMILIK", window.selectedLotData.owner.toUpperCase()],
                        ["KELUASAN", window.selectedLotData.area],
                        ["KOORDINAT", `${center.lat.toFixed(6)}, ${center.lng.toFixed(6)}`]
                    ];

                    data.forEach(row => {
                        doc.setFillColor(245, 245, 245); doc.rect(18, startY, 70, 22, 'F');
                        doc.setFontSize(9); doc.setTextColor(100); doc.text(row[0], 22, startY + 6);
                        doc.setFontSize(11); doc.setTextColor(0); 
                        let splitText = doc.splitTextToSize(row[1], 65);
                        doc.text(splitText, 22, startY + 14);
                        startY += 30;
                    });

                    // MASUKKAN GAMBAR PETA (LOT DI TENGAH)
                    // x=97, y=14, lebar=308, tinggi=269
                    doc.addImage(imgData, 'PNG', 97, 14, 308, 269);

                    // Nota Kaki
                    doc.setFontSize(8); doc.setTextColor(150);
                    doc.text("Cetakan Digital Sistem Cempaka Resident. Sahih pada waktu cetakan sahaja.", 52.5, 275, {align: "center"});

                    // Simpan
                    doc.save(`Laporan_Lot_${window.selectedLotData.lot}.pdf`);

                } catch (err) {
                    console.error("Gagal menjana PDF:", err);
                    alert("Ralat teknikal berlaku semasa menjana laporan.");
                } finally {
                    map.removeLayer(tempMarker);
                    overlay.style.display = "none";
                }
            }
        </script>
    </body>
</html>
