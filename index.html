<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cempaka Digital Resident - PUO</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <style>
            body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; }
            
            /* --- HEADER --- */
            header {
                position: relative; height: 130px; width: 100%; overflow: hidden;
                display: flex; align-items: center; justify-content: center; color: white;
                border-bottom: 5px solid #e74c3c; z-index: 1000;
            }
            #header-video {
                position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
                width: auto; height: auto; transform: translate(-50%, -50%);
                z-index: -1; filter: brightness(25%); object-fit: cover;
            }
            .header-content { display: flex; align-items: center; width: 96%; justify-content: space-between; z-index: 1; }
            .logo-poli { height: 80px; }
            .logo-puo { height: 85px; }

            /* --- LAYOUT --- */
            #wrapper { display: flex; width: 100%; height: calc(100vh - 130px); }
            #sidebar { min-width: 340px; background: #ffffff; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 1050; transition: 0.3s; }
            #sidebar.active { margin-left: -340px; }
            #map-container { flex-grow: 1; position: relative; }
            #map { width: 100%; height: 100%; }
            
            #sidebarCollapse { position: absolute; top: 15px; left: 15px; z-index: 1000; background: #1a252f; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }

            /* --- SIDEBAR CARDS --- */
            .card-menu { background: #fff; border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid #eee; }
            .card-menu h6 { font-weight: 700; color: #1a252f; margin-bottom: 12px; border-bottom: 2px solid #e74c3c; padding-bottom: 8px; }
            
            .info-box { background: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 5px solid #e74c3c; margin-bottom: 12px; }
            .info-label { font-size: 11px; text-transform: uppercase; color: #95a5a6; font-weight: 800; display: block; }
            .info-value { font-size: 17px; color: #2c3e50; font-weight: 700; display: block; margin-top: 2px; }

            .btn-pdf { background: #d9534f; color: white; width: 100%; border: none; padding: 14px; border-radius: 10px; font-weight: 700; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
            .btn-pdf:hover { background: #c9302c; }

            #loading-overlay {
                display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); 
                z-index: 9999; color:white; text-align:center; padding-top:20%; font-size: 20px;
            }
        </style>
    </head>
    <body>

        <div id="loading-overlay">Menjana Laporan Rasmi A3... <br> Sila tunggu sebentar.</div>

        <img id="logoPuo" src="image_247e7c.png" style="display:none;">

        <header>
            <video autoplay muted loop playsinline id="header-video">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-interface-background-31776-large.mp4" type="video/mp4">
            </video>
            <div class="header-content">
                <img src="Poli_Logo.png" class="logo-poli">
                <div class="text-center">
                    <h1 class="m-0 fw-bold">Cempaka Digital Resident</h1>
                    <p class="m-0 text-warning">Sistem Maklumat Lot Tanah Terdigital</p>
                </div>
                <img src="image_247e7c.png" class="logo-puo">
            </div>
        </header>

        <div id="wrapper">
            <nav id="sidebar">
                <div class="card-menu">
                    <h6>Butiran Lot Terpilih</h6>
                    <div id="lotDataDisplay">
                        <div class="info-box">
                            <span class="info-label">Nombor Lot</span>
                            <span class="info-value" id="res-no-lot">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Keluasan (Area)</span>
                            <span class="info-value" id="res-luas">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Pemilik</span>
                            <span class="info-value" id="res-owner">-</span>
                        </div>
                        <button class="btn btn-pdf" onclick="generateFinalPDF()">
                            <i class="fas fa-print"></i> CETAK LAPORAN PDF
                        </button>
                    </div>
                </div>
                <div class="card-menu">
                    <h6>Cari No Lot</h6>
                    <select id="lotSearchSelector" class="form-select">
                        <option value="">-- Pilih Nombor Lot --</option>
                    </select>
                </div>
            </nav>

            <div id="map-container">
                <button id="sidebarCollapse"><i class="fas fa-bars"></i></button>
                <div id="map"></div>
            </div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/LOTFINAL_0.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <script>
            var highlightLayer;
            window.selectedLotData = { lot: "-", owner: "-", area: "-" };

            var map = L.map('map', { zoomControl: false }).setView([2.10385, 102.5214], 19);
            L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { 
                maxZoom: 22, 
                crossOrigin: 'anonymous' 
            }).addTo(map);

            // Gaya asal lot
            var defaultStyle = { color: 'white', weight: 1.5, fillColor: '#e74c3c', fillOpacity: 0.3 };

            function highlightFeature(layer) {
                lotLayer.eachLayer(l => lotLayer.resetStyle(l));
                highlightLayer = layer;
                highlightLayer.setStyle({ 
                    weight: 5, 
                    color: '#ffff00', 
                    fillColor: '#e74c3c', 
                    fillOpacity: 0.5 
                });
                
                var props = highlightLayer.feature.properties;
                document.getElementById('res-no-lot').innerText = props['NO LOT'] || "-";
                document.getElementById('res-owner').innerText = props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)";
                document.getElementById('res-luas').innerText = parseFloat(props['AREA']).toFixed(5) + " m²";
                
                window.selectedLotData = {
                    lot: props['NO LOT'] || "-",
                    owner: props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)",
                    area: parseFloat(props['AREA']).toFixed(5) + " m²"
                };
            }

            var lotLayer = L.geoJson(json_LOTFINAL_0, {
                style: defaultStyle,
                onEachFeature: function(feature, layer) {
                    if (feature.properties['NO LOT']) {
                        $('#lotSearchSelector').append(`<option value="${feature.properties['NO LOT']}">Lot ${feature.properties['NO LOT']}</option>`);
                    }

                    layer.on({
                        // Kesan Hover (Mouse In)
                        mouseover: function(e) {
                            var l = e.target;
                            // Hanya ubah gaya jika lot ini bukan lot yang sedang terpilih (highlighted)
                            if (l !== highlightLayer) {
                                l.setStyle({
                                    weight: 3,
                                    color: '#ffffff',
                                    fillOpacity: 0.7
                                });
                                l.bringToFront();
                            }
                        },
                        // Kesan Hover (Mouse Out)
                        mouseout: function(e) {
                            var l = e.target;
                            if (l !== highlightLayer) {
                                lotLayer.resetStyle(l);
                            } else {
                                // Kekalkan gaya highlight jika ia lot terpilih
                                l.setStyle({ 
                                    weight: 5, 
                                    color: '#ffff00', 
                                    fillColor: '#e74c3c', 
                                    fillOpacity: 0.5 
                                });
                            }
                        },
                        // Fungsi Klik
                        click: function(e) {
                            highlightFeature(e.target);
                            map.fitBounds(e.target.getBounds(), { padding: [50, 50] });
                        }
                    });
                }
            }).addTo(map);

            $('#lotSearchSelector').change(function() {
                var val = $(this).val();
                lotLayer.eachLayer(layer => {
                    if (layer.feature.properties['NO LOT'] == val) {
                        map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                        highlightFeature(layer);
                    }
                });
            });

            $('#sidebarCollapse').click(function() { $('#sidebar').toggleClass('active'); });

            async function generateFinalPDF() {
                document.getElementById('loading-overlay').style.display = "block";
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a3'); 
                
                const canvas = await html2canvas(document.getElementById('map'), { 
                    useCORS: true, 
                    scale: 2 
                });
                const imgData = canvas.toDataURL('image/png');

                doc.setDrawColor(0);
                doc.setLineWidth(1.2); doc.rect(10, 10, 400, 277);
                doc.setLineWidth(0.3); doc.rect(12, 12, 396, 273);
                doc.setLineWidth(0.8); doc.line(95, 10, 95, 287);

                try {
                    const logo = document.getElementById("logoPuo");
                    doc.addImage(logo, 'PNG', 35, 18, 25, 28);
                } catch(e){}

                doc.setFont("times", "bold"); doc.setFontSize(14);
                doc.text("POLITEKNIK UNGKU OMAR", 47.5, 55, {align: "center"});
                doc.setLineWidth(0.5); doc.line(18, 58, 87, 58);

                doc.setFontSize(11); doc.setFont("times", "normal");
                doc.text("IPOH, PERAK", 47.5, 68, {align: "center"});
                doc.setFont("times", "bold"); doc.setTextColor(180, 0, 0);
                doc.text("DAERAH KINTA", 47.5, 75, {align: "center"});
                doc.setTextColor(0); doc.text("SISTEM MAKLUMAT GEOMATIK", 47.5, 82, {align: "center"});

                doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.setTextColor(100);
                doc.text("INFORMASI LOT", 18, 100);
                doc.setDrawColor(200); doc.line(18, 102, 87, 102);

                const labels = ["NO. LOT:", "NAMA PEMILIK:", "KELUASAN:", "TARIKH DOKUMEN:"];
                const values = [
                    window.selectedLotData.lot, 
                    window.selectedLotData.owner.toUpperCase(), 
                    window.selectedLotData.area,
                    new Date().toLocaleString('ms-MY')
                ];
                
                let currentY = 112;
                for(let i=0; i<4; i++){
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(120);
                    doc.text(labels[i], 18, currentY);
                    doc.setFont("times", "bold"); doc.setFontSize(12); doc.setTextColor(0);
                    let wrappedVal = doc.splitTextToSize(values[i], 68);
                    doc.text(wrappedVal, 18, currentY + 7);
                    currentY += 22;
                }

                doc.addImage(imgData, 'PNG', 97, 14, 308, 269);
                doc.save(`Laporan_Lot_${window.selectedLotData.lot}.pdf`);
                document.getElementById('loading-overlay').style.display = "none";
            }
        </script>
    </body>
</html>
