<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cempaka Digital Resident - Pelan Rasmi</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <style>
            body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; }
            header {
                position: relative; height: 110px; width: 100%; overflow: hidden;
                display: flex; align-items: center; justify-content: center; color: white;
                border-bottom: 5px solid #e74c3c; z-index: 1000;
            }
            #header-video {
                position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
                width: auto; height: auto; transform: translate(-50%, -50%);
                z-index: -1; filter: brightness(20%); object-fit: cover;
            }
            .header-content { display: flex; align-items: center; width: 95%; justify-content: space-between; z-index: 1; }
            .logo-poli, .logo-puo { height: 70px; }

            #wrapper { display: flex; width: 100%; height: calc(100vh - 110px); }
            #sidebar { min-width: 350px; background: #ffffff; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 1050; transition: 0.3s; }
            #sidebar.active { margin-left: -350px; }
            #map-container { flex-grow: 1; position: relative; background: #111; }
            #map { width: 100%; height: 100%; }
            
            #sidebarCollapse { position: absolute; top: 15px; left: 15px; z-index: 1000; background: #1a252f; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 8px; }

            .card-menu { background: #fff; border-radius: 12px; padding: 15px; margin: 12px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
            .card-menu h6 { font-weight: 800; color: #1a252f; margin-bottom: 15px; border-bottom: 3px solid #e74c3c; padding-bottom: 8px; display: inline-block; }
            
            .info-box { background: #fdfdfd; padding: 10px; border-radius: 6px; border-left: 5px solid #e74c3c; margin-bottom: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.02); }
            .info-label { font-size: 10px; text-transform: uppercase; color: #7f8c8d; font-weight: 800; display: block; }
            .info-value { font-size: 16px; color: #2c3e50; font-weight: 700; display: block; }

            .btn-pdf { background: #27ae60; color: white; width: 100%; border: none; padding: 15px; border-radius: 10px; font-weight: 800; letter-spacing: 1px; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
            .btn-pdf:hover { background: #219150; transform: translateY(-2px); }

            #loading-overlay {
                display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); 
                z-index: 9999; color:white; text-align:center; padding-top:15%;
            }
            .spinner-custom { width: 3rem; height: 3rem; color: #e74c3c; }
        </style>
    </head>
    <body>

        <div id="loading-overlay">
            <div class="spinner-border spinner-custom mb-3" role="status"></div>
            <h2 class="fw-bold">MENJANA LAPORAN HD</h2>
            <p>Peta sedang memfokuskan lot dan memuat turun imej satelit...<br>Sila jangan tutup pelayar anda.</p>
        </div>

        <img id="logoPuo" src="image_247e7c.png" style="display:none;">

        <header>
            <video autoplay muted loop playsinline id="header-video">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-interface-background-31776-large.mp4" type="video/mp4">
            </video>
            <div class="header-content">
                <img src="Poli_Logo.png" class="logo-poli">
                <div class="text-center">
                    <h2 class="m-0 fw-bold">CEMPAKA DIGITAL RESIDENT</h2>
                    <p class="m-0 text-warning fw-bold"><i class="fas fa-map-marker-alt"></i> UNIT GEOMATIK - POLITEKNIK UNGKU OMAR</p>
                </div>
                <img src="image_247e7c.png" class="logo-puo">
            </div>
        </header>

        <div id="wrapper">
            <nav id="sidebar">
                <div class="card-menu">
                    <h6><i class="fas fa-info-circle"></i> BUTIRAN LOT</h6>
                    <div id="lotDataDisplay">
                        <div class="info-box">
                            <span class="info-label">Nombor Lot</span>
                            <span class="info-value" id="res-no-lot">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Keluasan</span>
                            <span class="info-value" id="res-luas">-</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Pemilik</span>
                            <span class="info-value" id="res-owner">-</span>
                        </div>
                        <button class="btn btn-pdf" onclick="generateFinalPDF()">
                            <i class="fas fa-file-download"></i> JANA PELAN AKUI (PDF)
                        </button>
                    </div>
                </div>
                <div class="card-menu">
                    <h6><i class="fas fa-search"></i> CARIAN</h6>
                    <select id="lotSearchSelector" class="form-select border-danger">
                        <option value="">-- Pilih Nombor Lot --</option>
                    </select>
                </div>
            </nav>

            <div id="map-container">
                <button id="sidebarCollapse"><i class="fas fa-bars"></i></button>
                <div id="map"></div>
            </div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/LOTFINAL_0.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <script>
            var highlightLayer;
            window.selectedLotData = { lot: "-", owner: "-", area: "-", layer: null };

            // Inisialisasi Peta
            var map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                maxZoom: 22
            }).setView([2.10385, 102.5214], 19);
            
            // Satelit Layer
            var satelliteLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { 
                maxZoom: 22, 
                crossOrigin: 'anonymous' 
            }).addTo(map);

            var defaultStyle = { color: 'white', weight: 1.5, fillColor: '#e74c3c', fillOpacity: 0.2 };

            function highlightFeature(layer) {
                lotLayer.eachLayer(l => lotLayer.resetStyle(l));
                highlightLayer = layer;
                
                // Style semasa di web
                highlightLayer.setStyle({ 
                    weight: 4, 
                    color: '#ffff00', 
                    fillColor: '#e74c3c', 
                    fillOpacity: 0.5 
                });
                
                var props = highlightLayer.feature.properties;
                document.getElementById('res-no-lot').innerText = props['NO LOT'] || "-";
                document.getElementById('res-owner').innerText = props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)";
                document.getElementById('res-luas').innerText = (props['AREA'] ? parseFloat(props['AREA']).toFixed(3) + " m²" : "-");
                
                window.selectedLotData = {
                    lot: props['NO LOT'] || "-",
                    owner: props['tsp — pe'] || props['Pemilik'] || "Jabatan Geomatik (PUO)",
                    area: (props['AREA'] ? parseFloat(props['AREA']).toFixed(3) + " m²" : "-"),
                    layer: layer
                };
            }

            var lotLayer = L.geoJson(json_LOTFINAL_0, {
                style: defaultStyle,
                onEachFeature: function(feature, layer) {
                    if (feature.properties['NO LOT']) {
                        $('#lotSearchSelector').append(`<option value="${feature.properties['NO LOT']}">Lot ${feature.properties['NO LOT']}</option>`);
                    }
                    layer.on({
                        click: function(e) {
                            highlightFeature(e.target);
                            map.flyToBounds(e.target.getBounds(), { padding: [50, 50] });
                        }
                    });
                }
            }).addTo(map);

            $('#lotSearchSelector').change(function() {
                var val = $(this).val();
                lotLayer.eachLayer(layer => {
                    if (layer.feature.properties['NO LOT'] == val) {
                        highlightFeature(layer);
                        map.flyToBounds(layer.getBounds(), { padding: [50, 50] });
                    }
                });
            });

            $('#sidebarCollapse').click(function() { $('#sidebar').toggleClass('active'); });

            // --- FUNGSI JANA PDF (TITIK FOKUS TENGAH & SANGAT JELAS) ---
            async function generateFinalPDF() {
                if(window.selectedLotData.lot === "-") {
                    alert("Sila pilih lot pada peta terlebih dahulu.");
                    return;
                }

                const overlay = document.getElementById('loading-overlay');
                overlay.style.display = "block";

                // 1. PROSES FOKUS EKSTRIM
                const targetLayer = window.selectedLotData.layer;
                
                // Sembunyikan UI yang mengganggu
                document.getElementById('sidebarCollapse').style.display = 'none';
                
                // Zum sangat rapat (Level 21) dan letak lot di tengah-tengah
                map.setView(targetLayer.getBounds().getCenter(), 21, { animate: false });
                
                // Modifikasi style lot khusus untuk PDF (Border kuning tebal)
                targetLayer.setStyle({
                    weight: 10,
                    color: '#ffff00',
                    fillOpacity: 0.3
                });

                // Tambah Label Gergasi di peta untuk PDF
                var pdfMarker = L.marker(targetLayer.getBounds().getCenter(), {
                    icon: L.divIcon({
                        className: 'custom-pdf-label',
                        html: `<div style="background:rgba(255,255,0,0.9); color:black; padding:8px 15px; border:4px solid #000; font-size:24px; font-weight:900; border-radius:10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); white-space:nowrap;">LOT ${window.selectedLotData.lot}</div>`,
                        iconSize: [150, 50],
                        iconAnchor: [75, 25]
                    })
                }).addTo(map);

                // Tunggu 2 saat untuk tiles Google Satelit berkualiti HD keluar
                await new Promise(r => setTimeout(r, 2000));

                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('l', 'mm', 'a3'); 
                    
                    // Ambil skrin dengan kualiti Ultra HD (scale 4)
                    const canvas = await html2canvas(document.getElementById('map'), { 
                        useCORS: true, 
                        scale: 4, 
                        logging: false
                    });
                    
                    const imgData = canvas.toDataURL('image/png');

                    // --- REKA BENTUK PDF ---
                    // Bingkai Rasmi
                    doc.setDrawColor(0); doc.setLineWidth(2); doc.rect(5, 5, 410, 287);
                    doc.setLineWidth(0.5); doc.rect(7, 7, 406, 283);
                    doc.line(100, 5, 100, 292); // Line Sidebar

                    // Header Logo
                    const puoLogo = document.getElementById("logoPuo");
                    doc.addImage(puoLogo, 'PNG', 38, 15, 25, 30);

                    doc.setFont("times", "bold"); doc.setFontSize(18);
                    doc.text("POLITEKNIK UNGKU OMAR", 52.5, 55, {align: "center"});
                    
                    doc.setDrawColor(231, 76, 60); doc.setLineWidth(1.5); doc.line(20, 60, 85, 60);

                    doc.setFontSize(11); doc.setFont("times", "normal"); doc.setTextColor(80);
                    doc.text("JABATAN KEJURUTERAAN AWAM", 52.5, 68, {align: "center"});
                    doc.text("PELAN MAKLUMAT DIGITAL", 52.5, 74, {align: "center"});

                    // Informasi Lot
                    let startY = 100;
                    const info = [
                        { k: "NOMBOR LOT", v: window.selectedLotData.lot },
                        { k: "NAMA PEMILIK", v: window.selectedLotData.owner },
                        { k: "KELUASAN TANAH", v: window.selectedLotData.area },
                        { k: "TARIKH CETAK", v: new Date().toLocaleDateString('ms-MY') }
                    ];

                    info.forEach(item => {
                        doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(150);
                        doc.text(item.k, 20, startY);
                        
                        doc.setFillColor(245, 245, 245); doc.rect(20, startY + 2, 70, 15, 'F');
                        doc.setDrawColor(200); doc.rect(20, startY + 2, 70, 15, 'S');

                        doc.setFont("times", "bold"); doc.setFontSize(13); doc.setTextColor(0);
                        let wrap = doc.splitTextToSize(item.v.toUpperCase(), 65);
                        doc.text(wrap, 24, startY + 11);
                        startY += 30;
                    });

                    // MASUKKAN PETA (Lot sudah di tengah & Dizum rapat)
                    // x=102, y=9, lebar=303, tinggi=279
                    doc.addImage(imgData, 'PNG', 102, 9, 303, 279, undefined, 'FAST');

                    // Simpan PDF
                    doc.save(`Laporan_Tanah_Lot_${window.selectedLotData.lot}.pdf`);

                } catch (err) {
                    console.error(err);
                    alert("Ralat menjana PDF. Sila cuba lagi.");
                } finally {
                    // Reset peta ke asal
                    map.removeLayer(pdfMarker);
                    targetLayer.setStyle({ weight: 4, color: '#ffff00', fillOpacity: 0.5 });
                    document.getElementById('sidebarCollapse').style.display = 'block';
                    overlay.style.display = "none";
                }
            }
        </script>
    </body>
</html>
